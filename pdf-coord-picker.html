<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Coordinate Picker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#1a1a2e;color:#eee;padding:16px}
h1{font-size:16px;margin-bottom:12px;color:#e8470a}
.controls{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
select,button{padding:8px 14px;border-radius:6px;border:none;font-size:14px;cursor:pointer}
button{background:#e8470a;color:#fff}
select{background:#2a2a3e;color:#eee;border:1px solid #444}
#canvas-wrap{position:relative;display:inline-block;cursor:crosshair;border:2px solid #e8470a}
canvas{display:block}
.crosshair{position:absolute;pointer-events:none;top:0;left:0;width:100%;height:100%}
#info{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;margin-top:12px;min-height:60px;font-size:13px;line-height:1.8}
#log{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;margin-top:8px;max-height:300px;overflow-y:auto;font-size:12px}
.coord-entry{display:flex;gap:10px;margin-bottom:4px;border-bottom:1px solid #222;padding-bottom:4px}
.coord-val{color:#58a6ff}
.coord-label{color:#8b949e;flex:1}
button.copy{background:#238636;padding:4px 8px;font-size:11px}
#hline,#vline{position:absolute;pointer-events:none;background:rgba(232,71,10,.5)}
#hline{height:1px;left:0;right:0}
#vline{width:1px;top:0;bottom:0}
</style>
</head>
<body>
<h1>PDF Coordinate Picker — pdf-lib (bottom-left origin)</h1>
<div class="controls">
  <select id="pdfSel">
    <option value="pdfs/Reference-Form-Individual.pdf">Individual Form</option>
    <option value="pdfs/Reference-Form-Corporate.pdf">Corporate Form</option>
  </select>
  <input id="zoomIn" type="range" min="0.5" max="2" step="0.1" value="1" style="width:120px">
  <span id="zoomVal">1.0×</span>
  <button onclick="clearLog()">Clear log</button>
  <button onclick="copyLog()" class="copy">Copy all coords</button>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="hline" style="display:none"></div>
  <div id="vline" style="display:none"></div>
</div>

<div id="info">Click anywhere on the PDF to record coordinates. <br>Coordinates are in pdf-lib format (x from left, y from bottom).</div>
<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" integrity="sha384-/1qUCSGwTur9vjf/z9lmu/eCUYbpOTgSjmpbMQZ1/CtX2v/WcAIKqRv+U1DUCG6e" crossorigin="anonymous"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfPage = null;
let pageWidth = 595.28, pageHeight = 841.89;
let currentZoom = 1;
let coords = [];
let labelCounter = 0;

async function loadPdf() {
  const url = document.getElementById('pdfSel').value;
  const pdf = await pdfjsLib.getDocument(url).promise;
  pdfPage = await pdf.getPage(1);
  render();
}

async function render() {
  const canvas = document.getElementById('c');
  const viewport = pdfPage.getViewport({ scale: currentZoom });
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await pdfPage.render({ canvasContext: ctx, viewport }).promise;
  pageWidth = viewport.width / currentZoom;
  pageHeight = viewport.height / currentZoom;
}

document.getElementById('pdfSel').onchange = loadPdf;
document.getElementById('zoomIn').oninput = function() {
  currentZoom = parseFloat(this.value);
  document.getElementById('zoomVal').textContent = currentZoom.toFixed(1) + '×';
  if (pdfPage) render();
};

const wrap = document.getElementById('canvas-wrap');
wrap.addEventListener('mousemove', function(e) {
  const rect = document.getElementById('c').getBoundingClientRect();
  const relX = e.clientX - rect.left;
  const relY = e.clientY - rect.top;
  const pdfX = relX / currentZoom;
  const pdfY = pageHeight - (relY / currentZoom);
  document.getElementById('info').innerHTML =
    `<b>Current:</b> x=<span style="color:#58a6ff">${pdfX.toFixed(1)}</span>, y=<span style="color:#58a6ff">${pdfY.toFixed(1)}</span>` +
    ` &nbsp;|&nbsp; canvas: ${relX.toFixed(0)}, ${relY.toFixed(0)}`;

  const hl = document.getElementById('hline');
  const vl = document.getElementById('vline');
  hl.style.display = 'block'; hl.style.top = relY + 'px';
  vl.style.display = 'block'; vl.style.left = relX + 'px';
});

wrap.addEventListener('click', function(e) {
  const rect = document.getElementById('c').getBoundingClientRect();
  const relX = e.clientX - rect.left;
  const relY = e.clientY - rect.top;
  const pdfX = (relX / currentZoom).toFixed(1);
  const pdfY = (pageHeight - relY / currentZoom).toFixed(1);

  const label = prompt('Label for this coordinate:', 'field_' + (++labelCounter));
  if (!label) return;

  coords.push({ label, x: pdfX, y: pdfY });
  renderLog();
});

function renderLog() {
  const log = document.getElementById('log');
  log.innerHTML = coords.map((c, i) =>
    `<div class="coord-entry">
      <span class="coord-label">${c.label}</span>
      <span class="coord-val">x:${c.x}, y:${c.y}</span>
      <button class="copy" onclick="removeCoord(${i})">✕</button>
    </div>`
  ).join('');
}

function removeCoord(i) { coords.splice(i, 1); renderLog(); }
function clearLog() { coords = []; labelCounter = 0; renderLog(); }
function copyLog() {
  const text = coords.map(c => `// ${c.label}\n{ x: ${c.x}, y: ${c.y} }`).join('\n\n');
  navigator.clipboard.writeText(text).then(() => alert('Copied!'));
}

loadPdf();
</script>
</body>
</html>

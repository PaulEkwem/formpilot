name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON files (vercel.json, package.json)
        run: |
          node -e "JSON.parse(require('fs').readFileSync('vercel.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

      - name: Check for stale EmailJS references in active code
        run: |
          if grep -RIn --include='*.html' --include='*.js' \
               --exclude-dir=node_modules --exclude-dir=archive \
               --exclude-dir='.venv' \
               -E 'emailjs\.|@emailjs/' .; then
            echo "::error::EmailJS reference found outside archive/. Removed in Sprint 2."
            exit 1
          fi
          echo "OK — no EmailJS in active code."

      - name: Verify no asset/ paths leaked back into HTML
        run: |
          if grep -RIn --include='*.html' \
               --exclude-dir=node_modules --exclude-dir=archive \
               -E 'href="assets/|src="assets/' .; then
            echo "::error::Old assets/ path found. Sprint 1 moved everything to src/."
            exit 1
          fi
          echo "OK — no legacy assets/ paths."

      - name: Verify SRI hashes on CDN scripts
        run: |
          # Find <script src="https://..."> WITHOUT integrity= attribute,
          # excluding known-good loader scripts that intentionally have no SRI
          # (Sentry's loader script rotates by design).
          if grep -RIn --include='*.html' \
               --exclude-dir=node_modules --exclude-dir=archive \
               -E '<script[^>]*src="https://[^"]*"[^>]*>' . \
             | grep -v 'integrity=' \
             | grep -v 'sentry-cdn\.com'; then
            echo "::error::CDN script without SRI integrity hash."
            exit 1
          fi
          echo "OK — every CDN script has an SRI hash (Sentry loader excluded by design)."

  smoke-tests:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
